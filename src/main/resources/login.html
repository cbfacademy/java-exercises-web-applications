<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        form > div {
            margin-bottom: 1em;
        }
        form > div label {
            display: block;
            margin-bottom: 0.5em;
            font-weight: bold;
        }
        form > div input[type="email"],
        form > div input[type="password"] {
            width: 100%;
            padding: 0.5em;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        form > div:nth-child(3) {
            display: flex;
            align-items: center;
        }
        form > div:nth-child(3) input[type="checkbox"] {
            margin-right: 0.5em;
        }
        form > div:nth-child(3) a {
            margin-left: auto;
            color: #ff4d4d;
            text-decoration: none;
        }
        form > div:nth-child(3) a:hover {
            text-decoration: underline;
        }
        button {
            width: 100%;
            padding: 0.75em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h1>Login</h1>
    <!-- Add your login form here -->
</body>

</html>
